<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>

    <style>
        .cards {
            margin: 0 auto;
            max-width: 1200px;
            display: flex;
            border: 1px black solid;
            flex-wrap: wrap;
        }

        .card {
            margin: 0 auto;
            padding: 45px;
            border: 1px black solid;
            background-color: plum;
            text-align: center
        }
    </style>

</head>

<body>
    <div class="cards">
        <div class="card">
            <div class="city"><span>縣市：${Name}</span></div>
            <div class="time">
                <p>開始時間:${start_time}</p>
                <span>結束時間:${end_time}</p>
            </div>
            <div class="tempture">
                <p>溫度:${MinT}~${MaxT}</p>
            </div>
            <div class="description">
                <p>天氣描述:${description}</p>
                <img src="" alt="">
            </div>

        </div>



        <script src="https://code.jquery.com/jquery-3.4.1.min.js"
            integrity="sha256-CSXorXvZcTkaix6Yvo6HppcZGetbYMGWSFlBw8HfCJo=" crossorigin="anonymous"></script>
        <script>
            $.ajax({
                url: "https://opendata.cwb.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=CWB-B5282D9D-8FDD-40E9-AD48-B1DF3270465D",
                success: function (res) {
                    console.log(res)

                    for (let index = 0; index < res.records.location.length; index++) {

                        //地區  
                        const Name = res.records.location[index].locationName;

                        // //開始時間
                        const start_time = res.records.location[index].weatherElement[2].time[0].startTime;

                        // //結束時間
                        const end_time = res.records.location[index].weatherElement[2].time[0].endTime;

                        //最低溫度
                        const MinT = res.records.location[index].weatherElement[2].time[0].parameter.parameterName;
                        //最高溫度
                        const MaxT = res.records.location[index].weatherElement[4].time[0].parameter.parameterName;
                        //天氣描述
                        const description = res.records.location[index].weatherElement[0].time[0].parameter.parameterName;

                        const description_number = res.records.location[index].weatherElement[0].time[0].parameter.parameterValue;

                        
                        console.log(description_number)
                        var img_A = "http://icons.iconarchive.com/icons/papirus-team/papirus-apps/512/weather-icon.png";
                        var img_B = "http://icons.iconarchive.com/icons/wineass/ios7-redesign/512/Weather-icon.png";
                        var img_C = "https://cdn3.iconfinder.com/data/icons/bebreezee-weather-symbols/690/icon-weather-sunrainheavy-512.png";
                        
                        var img 
                       //先做一個空盒子
                       //再用判斷式丟東西進去
                        if(description_number == "3"){
                            img = img_A
                        }
                        else if (description_number == "5") {
                            img = img_B
                        }
                        else{
                            img = img_C
                        }


                        var card = document.querySelector(".cards")
                        card.innerHTML +=
                            `
                        <div class="card">
            <div class="city"><span>縣市：${Name}</span></div>
            <div class="time">
                <p>開始時間:${start_time}</p>
                <span>結束時間:${end_time}</p>
            </div>
            <div class="tempture">
                <p>溫度:${MinT}~${MaxT}</p>
            </div>
            <div class="description">
                <p>天氣描述:${description}</p>
                <img src="${img}" alt="" width="250px" height="250px">
            </div>


                        </div>

                    `


                        // $(".cards").append(`
                        //     <div class="card">
                        //         <div class="city"><span>縣市：${Name}</span></div>
                        //         <div class="time">
                        //             <p>開始時間:${start_time}</p>
                        //             <span>結束時間:${end_time}</p>
                        //         </div>
                        //         <div class="tempture">
                        //             <p>溫度:${MinT}~${MaxT}C</p>
                        //         </div>
                        //         <div class="tempture">
                        //             <p>天氣描述:${description}</p>
                        //         </div>
                        //         <div class="img">
                        //         <img id="img_A" src="https://www.petmd.com/sites/default/files/what-does-it-mean-when-cat-wags-tail.jpg" alt="" width="250px" height="250px">
                        //          </div>
                        //     </div>

                        // `);




                    }


                }
            });



        </script>
</body>

</html>
