<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <link rel="stylesheet" href="/css/pic_mask.css">
    <style>
        body {
            margin: 0;
            display: flex;
        }

        ul {
            padding: 0;
        }

        nav {
            height: 100vh;
            width: 20vw;
            background-color: gray;
        }

        nav #up {
            height: 30%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        nav #up #logo {
            width: 200px;
            height: 200px;
            background-image: url("https://www.stylist.co.uk/images/app/uploads/2017/10/24184627/d82c29b23a574d0de11df28351edde1e-256x256.jpg?w=256&h=256&fit=max&auto=format%2Ccompress");
            background-position: center;
            background-size: cover;

        }

        nav #down {
            height: 70%;
            width: 100%;
            display: flex;
            justify-content: center;

        }


        nav #down .menu ul {
            list-style-type: none;
        }

        nav #down .menu ul li {
            font-size: 30px;
            padding: 20px;
            transition: 1s;
            border: red solid 1px;
        }

        nav #down .menu ul li:hover {
            font-size: 50px;

        }

        a {
            text-decoration: none;
        }

        #container {
            height: 100vh;
            width: 80vw;
            background-color: navy;
            display: flex;
            justify-content: center;
            align-items: center;
        }


        #all {
            height: 800px;
            width: 1200px;
            background-color: white;
            display: flex;
            flex-wrap: wrap;

        }

        #x {
            width: 33%;
            height: 100%;
            background-image: url('./images/bg-2.jpg');
            ;


        }


        #y {
            width: 33%;
            height: 100%;
            background-color: black;
            background-image: url('./images/bg-3.jpg');



        }

        #z {
            width: 34%;
            height: 100%;
            background-color: orange;
            background-image: url('./images/bg-4.jpg');


        }

        @media screen and (max-width:1280px) {

            #all {
            height: 700px;
            width: 70%;
            background-color: white;
            display: flex;
            flex-wrap: wrap;

        }

            #x {
                height: 50%;
                width: 100%;
            }

            #y {
                height: 50%;
                width: 50%;
            }

            #z {
                height: 50%;
                width: 50%;
            }
        }

        @media screen and (max-width:768px) {

            body {
                margin: 0;
                display: block;
            }

            nav {
                width: 100vw;
                height: 20vh;
                display: flex;
            }

            nav #up {
                height: 100%;
                width: 30%;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            nav #up #logo {
                width: 150px;
                height: 150px;
                background-image: url("https://www.stylist.co.uk/images/app/uploads/2017/10/24184627/d82c29b23a574d0de11df28351edde1e-256x256.jpg?w=256&h=256&fit=max&auto=format%2Ccompress");
                background-position: center;
                background-size: cover;

            }

            nav #down {
                height: 100%;
                width: 70%;
                display: flex;
                justify-content: center;
                justify-content:flex-end;

            }

            nav #down #button {
                display: flex;
                align-items: center;
            }

            nav #down .menu ul {
                list-style-type: none;
                display: flex;
                justify-content: center;
                align-items: center;
            }



            nav #down .menu ul li {
                font-size: 30px;
                padding: 20px;
                transition: 1s;
                border: red solid 1px;
            }

            #container {
                width: 100vw;
                height: 80vh;
            }



            #all {
                height: 600px;
                width: 75%;
                background-color: white;
                display: flex;
                flex-wrap: wrap;


            }

            #x {
                width: 100%;
                height: 50%;
                background-color: green;

            }

            #y {
                width: 50%;
                height: 50%;
                background-color: black;



            }

            #z {
                width: 50%;
                height: 50%;
                background-color: orange;


            }
        }

        @media screen and (max-width:375px) {
            body {
                margin: 0;
                display: block;
            }

            nav {
                width: 100vw;
                height: 20vh;
            }

            nav #up {
                height: 100%;
                width: 30%;
                display: flex;
                justify-content: center;
                align-items: center;
                order: 2;
            }

            nav #up #logo {
                width: 70px;
                height: 70px;
                background-image: url("https://www.stylist.co.uk/images/app/uploads/2017/10/24184627/d82c29b23a574d0de11df28351edde1e-256x256.jpg?w=256&h=256&fit=max&auto=format%2Ccompress");
                background-position: center;
                background-size: cover;


            }

            nav #down {
                height: 100%;
                width: 70%;
                display: flex;
                justify-content: flex-start;
                align-items: flex-start;
                
            }

            nav #down #button {
                width: 70px;
                height: 70px;
                background-color: white;
                margin-left: 10px;
                margin:0;
                display: flex;
                justify-content: flex-start;
                align-items: flex-start;
            }



            nav #down .menu {
                display: none;
                

            }

            nav #down #button:hover .menu {
                display: flex;
            }

            nav #down .menu ul {
                list-style-type: none;
                z-index: 99;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }



            nav #down .menu ul li {
                font-size: 10px;
                transition: 1s;
                background-color:tomato ;
                
            }

            #container {
                width: 100vw;
                height: 80vh;
            }


            #all {
                height: 100%;
                width: 100%;
                background-color: white;
                display: flex;
                flex-wrap: wrap;


            }

            #x {
                width: 100%;
                height: 33%;
                background-color: green;

            }

            #y {
                width: 100%;
                height: 33%;
                background-color: black;



            }

            #z {
                width: 100%;
                height: 34%;
                background-color: orange;
            }

        }
    </style>
</head>

<body>
    <nav>
        <div id="up">
            <div id="logo"></div>
        </div>
        <div id="down">
            <div id="button">
                <div class="menu">
                    <ul>
                        <li>
                            <a href="http://www.google.com.tw/">home</a>
                        </li>
                        <li>
                            <a href="http://www.google.com.tw/">profile</a>
                        </li>
                        <li>
                            <a href="http://www.google.com.tw/">article</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>
    <div id="container">
        <div id="all">
            <div id="x" class="pic_mask"></div>
            <div id="y" class="pic_mask"></div>
            <div id="z" class="pic_mask"></div>
        </div>
    </div>
</body>

</html>
