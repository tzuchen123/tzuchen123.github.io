<!DOCTYPE html>
<html lang="en">

<head>

    <title>Document</title>
    <STYle>
        body {
            margin: 0 auto;
        }

        .container {
            display: flex;
        }

        #baner {
            width: 200px;
            height: 100vh;
            background-color: red;

        }

        .container #baner ul {
            list-style-type: none;
            padding-top: 65px;
            padding-left: 57px;
        }

        .container #baner ul li {
            font-size: 30px;
            margin: 5px;
        }

        #logo {
            width: 100px;
            height: 100px;
            background-image: url("https://www.stylist.co.uk/images/app/uploads/2017/10/24184627/d82c29b23a574d0de11df28351edde1e-256x256.jpg?w=256&h=256&fit=max&auto=format%2Ccompress");
            position: relative;
            top: 50px;
            left: 50px;
            background-position: center;
            background-size: cover;
        }

        #all {
            width: 800px;
            height: 800px;
            background-color: red;
            display: flex;
            position: relative;
            top: 100px;
            left: calc(50% - 400px);
        }

        #x {
            width: 33%;
            height: 100%;
            background-color: green;

        }


        #y {
            width: 33%;
            height: 100%;
            background-color: black;


        }

        #z {
            width: 34%;
            height: 100%;
            background-color: orange;


        }

            }

                top: 100px;
                left: calc(50% - 400px);
            }

            #x {
                width: 100%;
                height: 50%;
                background-color: green;

            }

            #y {
                width: 50%;
                height: 50%;
                background-color: black;

            }

            #z {
                width: 50%;
