<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css"
        integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">

    <title>Hello, world!</title>
    <style>
        body {
            margin: 0;
        }

        .cards .row {
            width: 100%;
            position: relative;
            box-sizing: border-box;
        }

        .cards .row::before {
            content: "";
            display: block;
            width: 50vw;
            height: 100%;
            position: absolute;
            top: 0px;
            left: -50%;
            /* z-index: 1; */
            background-color: rgb(34, 128, 200);
        }

        .cards .row::after {
            content: "";
            display: block;
            width: 50vw;
            height: 100%;
            position: absolute;
            top: 0px;
            right: -50%;
            /* z-index: 1; */
            background-color: rgb(95, 207, 99);
        }


        .cards .col-xl-3:nth-child(1) {
            background-color: rgb(37, 142, 222);
        }

        .cards .col-xl-3:nth-child(2) {
            background-color: rgb(79, 229, 255);
            z-index: 1;
        }

        .cards .col-xl-3:nth-child(3) {
            background-color: rgb(207, 143, 255);
            z-index: 1;
        }

        .cards .col-xl-3:nth-child(4) {
            background-color: rgb(105, 229, 110);
            z-index: 1;
        }

        .cards .img {
            min-height: 96px;
            width: 100%;
            text-align: left;
            flex: 1 1 auto;
            padding: 26px;
        }

        .cards h2 {
            color: black;
            font-size: 32px;
            letter-spacing: -0.03rem;
            line-height: 40px;
            font-weight: 600;
            margin: 0px 0px 26px;
        }

        .cards p {
            font-size: 16px;
            line-height: 20px;
            font-weight: 600;
            margin: 0px;
            color: black;
            padding: 25px 0;
        }

        .cards #arrow {
            margin: 0px 16px 0px 0px;
            padding: 15px 0;
            display: inline-block;
        }

        .cards span {
            color: black;
            font-size: 16px;
            font-family: "Segoe UI Mono", mono;
            letter-spacing: 0.01rem;
            padding: 15px 0;
            display: inline-block;
        }
    </style>

</head>

<body>
    <Section class="cards">
        <div class="container">
            <div class="row">
                <div class="col-xl-3 col-md-6 col-12">
                    <a href="">
                        <div class="img">
                            <img src="https://www.microsoft.com/design/fluent/assets/images/icon-globe.svg" alt="">
                        </div>
                        <div>
                            <h2>WEB</h2>
                            <p>Create your own web apps and add-ins.</p>
                        </div>
                        <div>
                            <span id="arrow">
                                <img src="https://www.microsoft.com/design/fluent/assets/images/arrow-black.svg" alt="">
                            </span>
                            <span>
                                Get Started
                            </span>
                        </div>
                    </a>
                </div>

                <div class="col-xl-3 col-md-6 col-12">
                    <a href="">
                        <div class="img">
                            <img src="https://www.microsoft.com/design/fluent/assets/images/icon-windows.svg" alt="">
                        </div>
                        <div>
                            <h2>windows</h2>
                            <p>Create and publish your own Windows apps.</p>
                        </div>
                        <div>
                            <span id="arrow"> <img
                                    src="https://www.microsoft.com/design/fluent/assets/images/arrow-black.svg"
                                    alt=""></span><span>Get Started</span>
                        </div>
                    </a>
                </div>
                <div class="col-xl-3 col-md-6 col-12">
                    <a href="">
                        <div class="img">
                            <img src="https://www.microsoft.com/design/fluent/assets/images/icon-IOS.svg" alt="">
                        </div>
                        <div>
                            <h2>IOS</h2>
                            <p>Take your custom apps to the mobile market.</p>
                        </div>
                        <div>
                            <span id="arrow"> <img
                                    src="https://www.microsoft.com/design/fluent/assets/images/arrow-black.svg"
                                    alt=""></span><span>Get Started</span>
                        </div>
                    </a>
                </div>
                <div class="col-xl-3 col-md-6 col-12">
                    <a href="">
                        <div class="img">
                            <img src="https://www.microsoft.com/design/fluent/assets/images/icon-Android.svg" alt="">
                        </div>
                        <div>
                            <h2>Android</h2>
                            <p>Take your custom apps to the mobile market.</p>
                        </div>
                        <div>
                            <span id="arrow"> <img
                                    src="https://www.microsoft.com/design/fluent/assets/images/arrow-black.svg"
                                    alt=""></span><span>Get Started</span>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </Section>




    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.6/umd/popper.min.js"
        integrity="sha384-wHAiFfRlMFy6i5SRaxvfOCifBUQy1xHdJ/yoi7FRNXMRBu5WHdZYu1hA6ZOblgut"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/js/bootstrap.min.js"
        integrity="sha384-B0UglyR+jN6CkvvICOB2joaf5I4l3gm9GU6Hc1og6Ls7i6U/mkkaduKaBhlAXv9k"
        crossorigin="anonymous"></script>
</body>

</html>
