<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        body {
            margin: 0;
        }

        .container {
            width: 100vw;
            height: 100vh;
            background-color: aquamarine;
        }

        #baner {
            height: 100vh;
            width: 200px;
            background-color: blue;
            float: left;
        }

        #all {
            height: 800px;
            width: 1100px;
            background-color: red;
            float: left;
            position: relative;
            top: calc(50vh - 400px);
            left: calc(50% - 550px);


        }

        #x {
            height: 100%;
            width: 33%;
            background-color: orange;
            float: left;
        }

        #y {
            width: 33%;
            height: 100%;
            background-color: pink;
            float: left;
        }

        #z {
            width: 34%;
            height: 100%;
            background-color: rgb(192, 28, 77);
            float: left;
        }

        @media screen and (max-width:1280px) {

            #baner {
                height: 100vh;
                width: 200px;
                background-color: blue;
                float: left;
            }

            #all {
                height: 600px;
                width: 400px;
                background-color: red;
                float: left;
                position: relative;
                top: calc(50vh - 300px);
                left: calc(50% - 400px);


            }

            #x {
                height: 50%;
                width: 100%;
                background-color: orange;
                float: left;
            }

            #y {
                height: 50%;
                width: 50%;
                background-color: pink;
                float: left;
            }

            #z {
                height: 50%;
                width: 50%;
                background-color: rgb(192, 28, 77);
                float: left;
            }

        }

        @media screen and (max-width:768px) {


            #baner {
                height: 100px;
                width: 100%;
                background-color: blue;

            }

            nav li {
                    float: left;
                }

            #all {
                height: 700px;
                width: 75%;
                background-color: red;
                position: relative;
                top: 5vh;
                left: 11vw;



            }

            #x {
                height: 50%;
                width: 100%;
                background-color: orange;
                float: left;
            }

            #y {
                height: 50%;
                width: 50%;
                background-color: pink;
                float: left;
            }

            #z {
                height: 50%;
                width: 50%;
                background-color: rgb(192, 28, 77);
                float: left;
            }



            @media screen and (max-width:375px) {


                #baner {
                    height: 8vh;
                    width: 100%;
                    background-color: blue;

                }

                nav li {
                    display: none
                }

                #all {
                    height: 92vh;
                    width: 100%;
                    background-color: red;
                    position: relative;
                    top: 0;
                    left: 0;



                }

                #x {
                    height: 33%;
                    width: 100%;
                    background-color: orange;
                    float: left;
                }

                #y {
                    height: 33%;
                    width: 100%;
                    background-color: pink;
                    float: left;
                }

                #z {
                    height: 34%;
                    width: 100%;
                    background-color: rgb(192, 28, 77);
                    float: left;
                }
    </style>
</head>

<body>
    <div class="container">
        <nav>
            <div id="baner">

                <div id="logo"></div>

                <ul>
                    <li>home</li>
                    <li>profile</li>
                    <li>article</li>
                </ul>

            </div>
        </nav>
        <main>
            <div id="all">
                <div id="x">
                    XXX
                </div>
                <div id="y">YYY</div>
                <div id="z">ZZZ</div>
            </div>

        </main>
    </div>

</body>

</html>
