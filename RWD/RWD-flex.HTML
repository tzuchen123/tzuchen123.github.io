<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>

    <link rel="stylesheet" href="pic_mask.css">

    <STYle>
        body {
            margin: 0;
        }

        .container {
            display: flex;
        }

        #baner {
            width: 200px;
            height: 100vh;
            background-color: red;
            display: block;

        }

        #logo {
            width: 100px;
            height: 100px;
            background-image: url("https://www.stylist.co.uk/images/app/uploads/2017/10/24184627/d82c29b23a574d0de11df28351edde1e-256x256.jpg?w=256&h=256&fit=max&auto=format%2Ccompress");
            background-position: center;
            background-size: cover;
            position: relative;
            top: 50px;
            left: 50px;

        }

        .container #baner ul {
            list-style-type: none;
            position: relative;
            top: 60px;
            left: 30px;
        }

        .container #baner ul li {
            font-size: 30px;
            transition: 0.5s;
            margin: 5px;

        }

        .container #baner ul li:hover {
            font-size: 50px;
            color: white;

        }

        .container #baner ul li a {
            text-decoration: none;
        }

        #all {
            height: 800px;
            width: 800px;
            background-color: white;
            display: flex;
            position: relative;
            top: calc(50vh - 400px);
            left: calc(50% - 550px);
        }

        #x {
            width: 33%;
            height: 100%;
            background-image: url('./images/bg-2.jpg');
            ;


        }


        #y {
            width: 33%;
            height: 100%;
            background-color: black;
            background-image: url('./images/bg-3.jpg');



        }

        #z {
            width: 34%;
            height: 100%;
            background-color: orange;
            background-image: url('./images/bg-4.jpg');


        }




        @media screen and (max-width:1280px) {


            #all {
                height: 800px;
                width: 600px;
                background-color: white;
                display: flex;
                flex-wrap: wrap;
                position: relative;
                top: calc(50vh - 400px);
                left: calc(50vw - 300px);


            }

            #x {
                height: 50%;
                width: 100%;
                background-color: green;

            }

            #y {
                height: 50%;
                width: 50%;
                background-color: black;

            }

            #z {
                height: 50%;
                width: 50%;
                background-color: orange;

            }



        }

        @media screen and (max-width:768px) {

            .container {
                display: block;
            }

            #baner {
                height: 100px;
                width: 100%;
                background-color: red;
                display: flex;
                justify-content: space-between;
                align-items: center;


            }

            #logo {
                width: 70px;
                height: 70px;
                background-image: url("https://www.stylist.co.uk/images/app/uploads/2017/10/24184627/d82c29b23a574d0de11df28351edde1e-256x256.jpg?w=256&h=256&fit=max&auto=format%2Ccompress");
                background-position: center;
                background-size: cover;
                position: relative;
                top: 0;
                left: 0;


            }

            .container #baner ul {
                list-style-type: none;
                display: flex;
                padding: 0 20px;
                top: 0;
                left: 0;
            }

            .container #baner ul li {
                font-size: 30px;
                transition: 0.5s;
                margin: 5px;

            }

            #all {
                height: 700px;
                width: 80%;
                background-color: white;
                display: flex;
                flex-wrap: wrap;
                position: relative;
                top: calc(50vh - 450px);
                left: calc(50% - 250px);


            }

            #x {
                width: 100%;
                height: 50%;
                background-color: green;

            }

            #y {
                width: 50%;
                height: 50%;
                background-color: black;



            }

            #z {
                width: 50%;
                height: 50%;
                background-color: orange;


            }

        }

        @media screen and (max-width:375px) {
            .container {
                display: block;
            }



            #baner {
                width: 100vw;
                height: 50px;
                background-color: red;
                display: flex;
                justify-content: space-around;

            }

            .menu_btm {
                width: 44px;
                height: 44px;
                background-color: grey;
            }

            .container #baner ul {
                list-style-type: none;
                display: none;

            }


            #logo {
                width: 44px;
                height: 44px;
                background-color: pink;
                position: relative;
                top: calc(50% - 21px);
                left: calc(50% - 22px);
            }



            #all {
                width: 100vw;
                height: 100vh;
                background-color: white;
                display: flex;
                flex-wrap: wrap;
                top: 0;
                left: 0;


            }

            #x {
                width: 100%;
                height: 33%;
                background-color: green;

            }

            #y {
                width: 100%;
                height: 33%;
                background-color: black;



            }

            #z {
                width: 100%;
                height: 34%;
                background-color: orange;


            }




        }
    </STYle>
</head>

<body>
    <div class="container">
        <nav>
            <div id="baner">

                <div id="logo"></div>

                <div class="menu_btm"></div>

                <div class="menu">
                    <ul>
                        <li>
                            <a href="http://www.google.com.tw/">home</a>
                        </li>
                        <li>
                            <a href="http://www.google.com.tw/">profile</a>
                        </li>
                        <li>
                            <a href="http://www.google.com.tw/">article</a>
                        </li>
                    </ul>
                </div>


            </div>
        </nav>

        <div id="all">
            <div id="x" class="pic_mask"></div>
            <div id="y" class="pic_mask"></div>
            <div id="z" class="pic_mask"></div>
        </div>
    </div>

</body>

</html>
